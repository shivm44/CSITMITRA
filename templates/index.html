<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSITmitra - GGU CSIT Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0F172A;
            --primary-light: #1E293B;
            --accent: #F59E0B;
            --accent-glow: rgba(245, 158, 11, 0.15);
            --text: #F1F5F9;
            --text-muted: #94A3B8;
            --surface: #1E293B;
            --surface-elevated: #334155;
            --border: #334155;
            --success: #10B981;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated background elements */
        .bg-decoration {
            position: fixed;
            pointer-events: none;
            z-index: 0;
        }

        .circle-1 {
            top: -100px;
            right: -100px;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--accent-glow), transparent);
            animation: float 20s ease-in-out infinite;
        }

        .circle-2 {
            bottom: -150px;
            left: -150px;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.1), transparent);
            animation: float 25s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -30px) scale(1.1); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        header {
            text-align: center;
            padding: 40px 0 30px;
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--accent) 0%, #EF4444 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 10px 30px rgba(245, 158, 11, 0.3);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 10px 30px rgba(245, 158, 11, 0.3); }
            50% { transform: scale(1.05); box-shadow: 0 15px 40px rgba(245, 158, 11, 0.5); }
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            margin-top: 5px;
            font-family: 'JetBrains Mono', monospace;
        }

        /* Chat Container */
        .chat-wrapper {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            max-width: 900px;
            margin: 0 auto;
            animation: fadeIn 0.8s ease-out 0.2s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .chat-container {
            background: var(--surface);
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px var(--shadow);
            overflow: hidden;
            backdrop-filter: blur(10px);
            position: relative;
        }

        .chat-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), #EF4444, var(--success));
            opacity: 0.8;
        }

        .chat-header {
            padding: 25px 30px;
            background: var(--primary-light);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--success);
            animation: blink 2s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-text {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .chat-messages {
            height: 500px;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: 
                linear-gradient(var(--surface) 30%, rgba(30, 41, 59, 0)),
                linear-gradient(rgba(30, 41, 59, 0), var(--surface) 70%) 0 100%,
                radial-gradient(farthest-side at 50% 0, rgba(148, 163, 184, 0.2), rgba(0,0,0,0)),
                radial-gradient(farthest-side at 50% 100%, rgba(148, 163, 184, 0.2), rgba(0,0,0,0)) 0 100%;
            background-repeat: no-repeat;
            background-size: 100% 40px, 100% 40px, 100% 14px, 100% 14px;
            background-attachment: local, local, scroll, scroll;
        }

        .chat-messages::-webkit-scrollbar {
            width: 8px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: var(--primary-light);
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 4px;
        }

        .message {
            display: flex;
            gap: 15px;
            max-width: 85%;
            animation: messageSlide 0.3s ease-out;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: linear-gradient(135deg, #3B82F6, #8B5CF6);
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.3);
        }

        .message.bot .message-avatar {
            background: linear-gradient(135deg, var(--accent), #EF4444);
            box-shadow: 0 5px 15px rgba(245, 158, 11, 0.3);
        }

        .message-content {
            flex: 1;
        }

        .message-bubble {
            padding: 15px 20px;
            border-radius: 16px;
            line-height: 1.6;
            font-size: 0.95rem;
            word-wrap: break-word;
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, #3B82F6, #8B5CF6);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.bot .message-bubble {
            background: var(--surface-elevated);
            color: var(--text);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }

        .message-time {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 5px;
            font-family: 'JetBrains Mono', monospace;
        }

        .message.user .message-time {
            text-align: right;
        }

        /* Input Area */
        .chat-input-area {
            padding: 25px 30px;
            background: var(--primary-light);
            border-top: 1px solid var(--border);
        }

        .input-wrapper {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        #messageInput {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid var(--border);
            border-radius: 16px;
            background: var(--surface);
            color: var(--text);
            font-size: 0.95rem;
            font-family: 'DM Sans', sans-serif;
            outline: none;
            transition: all 0.3s ease;
        }

        #messageInput:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        #messageInput::placeholder {
            color: var(--text-muted);
        }

        #sendButton {
            padding: 15px 30px;
            background: linear-gradient(135deg, var(--accent), #EF4444);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'DM Sans', sans-serif;
        }

        #sendButton:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(245, 158, 11, 0.4);
        }

        #sendButton:active {
            transform: translateY(0);
        }

        #sendButton:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Quick Actions */
        .quick-actions {
            display: flex;
            gap: 8px;
            margin-top: 15px;
            flex-wrap: wrap;
            max-height: 120px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .quick-actions::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        .quick-actions::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 4px;
        }

        .quick-action-btn {
            padding: 8px 16px;
            background: var(--surface-elevated);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'DM Sans', sans-serif;
        }

        .quick-action-btn:hover {
            background: var(--accent);
            color: var(--primary);
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        /* Welcome Message */
        .welcome-message {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .welcome-message .icon {
            font-size: 60px;
            margin-bottom: 20px;
            display: block;
        }

        .welcome-message h3 {
            font-size: 1.5rem;
            color: var(--text);
            margin-bottom: 10px;
        }

        /* Loading animation */
        .typing-indicator {
            display: none;
            align-items: center;
            gap: 5px;
            padding: 15px 20px;
            background: var(--surface-elevated);
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            width: fit-content;
        }

        .typing-indicator.active {
            display: flex;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            animation: typingAnimation 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typingAnimation {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.7; }
            30% { transform: translateY(-10px); opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .chat-messages {
                height: 400px;
            }

            .message {
                max-width: 90%;
            }

            .input-wrapper {
                flex-direction: column;
            }

            #sendButton {
                width: 100%;
                justify-content: center;
            }
        }

        /* Markdown-like styling in bot responses */
        .message-bubble strong {
            color: var(--accent);
            font-weight: 600;
        }

        .message-bubble em {
            color: var(--success);
        }
    </style>
</head>
<body>
    <!-- Background decorations -->
    <div class="bg-decoration circle-1"></div>
    <div class="bg-decoration circle-2"></div>

    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">🎓</div>
                <div>
                    <h1>CSITmitra</h1>
                    <p class="subtitle">Your GGU CSIT Department Assistant</p>
                </div>
            </div>
        </header>

        <div class="chat-wrapper">
            <div class="chat-container">
                <div class="chat-header">
                    <div class="status-indicator">
                        <div class="status-dot"></div>
                        <span class="status-text">Online & Ready</span>
                    </div>
                </div>

                <div class="chat-messages" id="chatMessages">
                    <div class="welcome-message">
                        <span class="icon">💬</span>
                        <h3>Welcome to CSITmitra!</h3>
                        <p>Ask me anything about GGU CSIT Department</p>
                    </div>
                </div>

                <div class="chat-input-area">
                    <div class="input-wrapper">
                        <input 
                            type="text" 
                            id="messageInput" 
                            placeholder="Type your message here..." 
                            autocomplete="off"
                        >
                        <button id="sendButton">
                            <span>Send</span>
                            <span>📤</span>
                        </button>
                    </div>
                    <div class="quick-actions">
                        <button class="quick-action-btn" onclick="sendQuickMessage('What are the fees?')">💰 Fees</button>
                        <button class="quick-action-btn" onclick="sendQuickMessage('List all courses offered')">📚 All Courses</button>
                        <button class="quick-action-btn" onclick="sendQuickMessage('How to apply for admission?')">🎓 Admission</button>
                        <button class="quick-action-btn" onclick="sendQuickMessage('Hostel information')">🏠 Hostel</button>
                        <button class="quick-action-btn" onclick="sendQuickMessage('Contact details')">📞 Contact</button>
                        <button class="quick-action-btn" onclick="sendQuickMessage('Placement highlights')">💼 Placements</button>
                        <button class="quick-action-btn" onclick="sendQuickMessage('Scholarship information')">🏅 Scholarships</button>
                        <button class="quick-action-btn" onclick="sendQuickMessage('Campus facilities')">🏫 Facilities</button>
                        <button class="quick-action-btn" onclick="sendQuickMessage('Tell me about GGU')">🏛️ About GGU</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');

        // Initialize
        let isFirstMessage = true;

        // Format markdown-like text
        function formatMessage(text) {
            return text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
        }

        // Add message to chat
        function addMessage(message, isUser = false) {
            if (isFirstMessage && isUser) {
                chatMessages.innerHTML = '';
                isFirstMessage = false;
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;
            
            const time = new Date().toLocaleTimeString('en-US', { 
                hour: 'numeric', 
                minute: '2-digit',
                hour12: true 
            });

            messageDiv.innerHTML = `
                <div class="message-avatar">${isUser ? '👤' : '🤖'}</div>
                <div class="message-content">
                    <div class="message-bubble">${formatMessage(message)}</div>
                    <div class="message-time">${time}</div>
                </div>
            `;

            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Show typing indicator
        function showTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    <div class="typing-indicator active">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            `;
            chatMessages.appendChild(typingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function removeTypingIndicator() {
            const typingIndicator = document.getElementById('typingIndicator');
            if (typingIndicator) {
                typingIndicator.remove();
            }
        }

        // Send message
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            // Add user message
            addMessage(message, true);
            messageInput.value = '';
            sendButton.disabled = true;

            // Show typing indicator
            showTypingIndicator();

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();
                
                // Remove typing indicator
                removeTypingIndicator();
                
                // Add bot response
                setTimeout(() => {
                    addMessage(data.response, false);
                }, 300);

            } catch (error) {
                removeTypingIndicator();
                addMessage('Sorry, something went wrong. Please try again!', false);
            } finally {
                sendButton.disabled = false;
                messageInput.focus();
            }
        }

        // Quick message
        function sendQuickMessage(message) {
            messageInput.value = message;
            sendMessage();
        }

        // Event listeners
        sendButton.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Focus input on load
        window.addEventListener('load', () => {
            messageInput.focus();
        });
    </script>
</body>
</html>
